# ============================================
# Glow Studio by Sofia — Docker Compose
# For local development only
# ============================================

version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - bot

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
